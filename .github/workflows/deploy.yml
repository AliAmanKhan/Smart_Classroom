name: Deploy to EC2

on:
  push:
    branches:
      - master # Or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. Build and Push Backend Images
      # You can repeat this block for frontend, or any other services
      - name: Build and Push Docker Images
        run: |
          cd backend
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          docker compose build
          docker compose push

      # 3. Deploy to EC2 (Pull and Run)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smart-classroom/Smart_Classroom
            git pull origin master
            
            # Navigate to backend and replace the local 'build' with Docker Hub images
            cd backend
            
            # Since your docker-compose.yml uses local 'build' blocks, we can override the image
            # Or temporarily export the IMAGE_PREFIX if you update your docker-compose.yml
            # For now, pulling manually or modifying the docker-compose to use these images is required.
            
            # The easiest way is to sed/replace the build contexts with the docker hub image, 
            # but ideally you update your docker-compose.yml to have `image: your-docker-user/service`
            
            docker-compose pull
            docker-compose up -d
