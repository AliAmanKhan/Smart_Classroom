server:
  port: 8082

spring:
  application:
    name: classroom-service
  datasource:
    url: jdbc:mysql://localhost:3306/smart_classroom?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    hikari:
      initialization-fail-timeout: -1   # retry indefinitely until MySQL is ready
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes in milliseconds

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

internal:
  api-key: ${INTERNAL_API_KEY}
